services:
  postgres:
    image: postgres:16-alpine
    container_name: rasg-blog-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rasg-blog
    ports:
      - "5432:5432"
    volumes:
      - rasg-blog-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rasg-blog"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  rasg-blog-db:
