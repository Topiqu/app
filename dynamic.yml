http:
  middlewares:
    redirect-https:
      redirectScheme:
        scheme: https
        permanent: true
    secure-headers:
      headers:
        forceSTSHeader: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        contentTypeNosniff: true
        referrerPolicy: no-referrer-when-downgrade
